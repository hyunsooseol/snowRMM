---
name:  lcgm
title: Latent Class Growth Modeling
jrs:   '1.1'
refs: snowRMM
items:
    - name: instructions
      title: 'Instructions'
      type: Html
      visible: True
      
    - name:  text
      title: ''
      type:  Preformatted
      
    - name: progressBarHTML
      title: ' '
      type: Html
      visible: false

    - name: desc
      title: 'Descriptive statistics'
      type: Table
      visible: (desc)
      clearWith:
        - vars
        - miss
        # - model
        # - nc
        # - thr
        # - miss
        # - auxVar
      refs: tidySEM

      columns:
        - name: name
          title: ''
          type: 'text'
          content: ($key)
        - name: n
          title: N
          type: number
        - name: missing
          title: Proportion missing
          type: number          
        - name: mean
          title: Mean
          type: number
        - name: median 
          title: Median  
          type: number
        - name: sd
          title: SD 
          type: number
        - name: min
          title: Minimum 
          type: number
        - name: max
          title: Maximum 
          type: number
 
    - name: fit
      title: 'Model fit'
      type: Table
      visible: (fit)
      clearWith:
        - vars
        - model
        - nc
        - thr
        - miss
#        - auxVar
      refs: tidySEM 

      columns:
        - name: name
          title: ''
          type: 'text'
          content: ($key)

        - name: value
          title: 'Values'

    - name: est
      title: 'Estimated parameters'
      type: Table
      visible: (est)
      clearWith:
        - vars
        - model
        - nc
        - thr
        - miss
#        - auxVar
      refs: tidySEM

      columns:
        - name: name
          title: ''
          type: 'text'
          content: ($key)
        - name: cat
          title: Category
          type: 'text'
        - name: lhs 
          title: lhs  
          type: 'text' 
        - name: est
          title: Estimate 
          type: number
        - name: se
          title: SE 
          type: number
        - name: p
          title: p 
          format: zto,pvalue
        - name: ci
          title: Confidence Interval
          type: number
        - name: na
          title: name
          type: 'text'

    - name: cp
      title: 'Size of each class'
      type: Table
      visible: (cp)
      refs: tidySEM
      clearWith:
        - vars
        - model
        - nc
        - thr
        - miss
      columns:
        - name: name
          title: 'Class'
          type: 'text'
          content: ($key)
        - name: count
          title: Count
          type: number
        - name: prop 
          title: Proportion   
          type: number

    - name: mem
      title: Class 
      type: Output
      varTitle: Class
      measureType: nominal
      clearWith:
        - vars
        - model
        - nc
        - thr
        - miss

    - name: plot2
      title: 'Class size plot'
      type: Image
      visible: (plot2)
      renderFun: .plot2
      clearWith:
        - vars
        - model
        - nc
        - thr
        - miss

    - name: plot1
      title: 'Density plot'
      type: Image
      visible: (plot1)
      renderFun: .plot1
      clearWith:
        - vars
        # - model
        # - nc
        # - thr
        # - miss
        # - auxVar
        
    - name: plot
      title: 'Trajectory plot'
      type: Image
      visible: (plot)
      renderFun: .plot
      clearWith:
        - vars
        - model
        - nc
        - thr
        - raw
        - miss
#        - auxVar

    - name: threeStepSummary
      title: '3-Step Analysis Summary'
      type: Table
      visible: (use3step)
      refs: tidySEM
      clearWith:
        - vars
        - auxVar
        - model
        - nc
        - thr
        - miss
      columns:
        - name: distal
          title: Distal variable
          type: text
  
        - name: dtype
          title: Type
          type: text
  
        - name: method
          title: Method
          type: text
  
        - name: k
          title: K
          type: integer
  
        - name: j
          title: J
          type: integer
  
        - name: test
          title: Test
          type: text

        - name: df1
          title: df1
          type: integer

        - name: df2
          title: df2
          type: number
  
        - name: statistic
          title: Statistic
          type: number
          format: zto
  
        - name: p
          title: p
          type: number
          format: pvalue
  
        - name: effect
          title: Effect size
          type: number
          format: zto
  
        - name: effectLabel
          title: Effect size type
          type: text
  
    - name: threeStepClassStats
      title: 'Class-specific Results'
      type: Table
      visible: (use3step)
      refs: tidySEM
      clearWith:
        - vars
        - auxVar
        - model
        - nc
        - thr
        - miss
      columns:
        - name: class
          title: Class
          type: text
  
        - name: category
          title: Category
          type: text
  
        - name: estimate
          title: Estimate
          type: number
          format: zto
  
        - name: statLabel
          title: Statistic
          type: text
  
    - name: threeStepPairwise
      title: 'Pairwise Comparisons'
      type: Table
      visible: (use3step)
      refs: tidySEM
      clearWith:
        - vars
        - auxVar
        - model
        - nc
        - thr
        - miss
      columns:
        - name: comparison
          title: Comparison
          type: text
  
        - name: test
          title: Test
          type: text

        - name: df1
          title: df1
          type: integer

        - name: df2
          title: df2
          type: number
  
        - name: statistic
          title: Statistic
          type: number
          format: zto
  
        - name: p
          title: p
          type: number
          format: pvalue
  
        - name: pBH
          title: p(BH)
          type: number
          format: pvalue
  
        - name: pBonf
          title: p(Bonf)
          type: number
          format: pvalue
  
        - name: effect
          title: Effect size
          type: number
          format: zto
  
        - name: effectLabel
          title: Effect size type
          type: text
...
