---
name:  lcaord
title: LCA with ordinal indicators
jrs:   '1.1'
refs: snowRMM
items:
    - name: instructions
      title: 'Instructions'
      type: Html
      visible: True
      
    - name:  text
      title: ''
      type:  Preformatted

    - name: progressBarHTML
      title: ' '
      type: Html
      visible: false

    - name: desc
      title: 'Descriptive statistics'
      type: Table
      visible: (desc)
      clearWith:
        - vars
        - nc
        - miss
      refs: tidySEM

      columns:
        - name: name
          title: ''
          type: 'text'
          content: ($key)
        - name: type
          title: Type
          type: 'text'
        - name: n 
          title: N  
          type: number
        - name: missing
          title: Proportion missing
          type: number
        - name: unique
          title: Unique 
          type: number
        - name: mode
          title: Mode 
          type: number
  
    - name: fit
      title: 'Model fit'
      type: Table
      visible: (fit)
      clearWith:
        - vars
        - nc
        - miss
      refs: tidySEM 

      columns:
        - name: name
          title: ''
          type: 'text'
          content: ($key)

        - name: value
          title: 'Values'

    - name: cp
      title: 'Size of each class'
      type: Table
      visible: (cp)
      refs: tidySEM
      clearWith:
        - vars
        - nc
        - miss
      columns:
        - name: name
          title: 'Class'
          type: 'text'
          content: ($key)
        - name: count
          title: Count
          type: number
        - name: prop 
          title: Proportion   
          type: number
 
    - name: mem
      title: Class 
      type: Output
      varTitle: Class
      measureType: nominal
      clearWith:
        - vars
        - nc
        - miss

    - name: plot1
      title: 'Bar plot'
      type: Image
      visible: (plot1)
      renderFun: .plot1
      clearWith:
        - vars
        - nc
        - miss
        
    - name: plot
      title: 'Response probilities'
      type: Image
      visible: (plot)
      renderFun: .plot
      clearWith:
        - vars
        - nc
        - angle
        - miss

    - name: use3step_means
      title: "3-step auxiliary: Class-weighted means"
      type: Table
      visible: (use3step)
      clearWith:
        - vars
        - nc
        - miss
        - auxVar
      columns:
        - name: class
          title: Class
          type: text
        - name: mean
          title: Mean
          type: number

    - name: use3step_omnibus
      title: "3-step auxiliary: Omnibus test"
      type: Table
      visible: (use3step)
      clearWith:
        - vars
        - nc
        - miss
        - auxVar
      columns:
        - name: method
          title: Method
          type: text
        - name: variable
          title: Variable
          type: text
        - name: statistic
          title: Statistic
          type: number
        - name: df1
          title: df1
          type: number
        - name: df2
          title: df2
          type: number
        - name: p
          title: p
          type: number
          format: zto,pvalue

    - name: use3step_pairwise
      title: "3-step auxiliary: Pairwise comparisons"
      type: Table
      visible: (use3step)
      clearWith:
        - vars
        - nc
        - miss
        - auxVar
      columns:
        - name: comparison
          title: Comparison
          type: text
        - name: z
          title: z
          type: number
        - name: p
          title: p
          type: number
          format: zto,pvalue
        - name: p_bh
          title: p (BH)
          type: number
          format: zto,pvalue
        - name: p_bonf
          title: p (Bonf.)
          type: number
          format: zto,pvalue
        - name: d
          title: d
          type: number

    - name: reg
      title: "Class-wise regression"
      type: Table
      visible: (reg)
      clearWith:
        - vars
        - nc
        - miss
        - auxFormula
      columns:
        - name: method
          title: Method
          type: text
        - name: variable
          title: Variable
          type: text
        - name: wald
          title: Wald
          type: number
        - name: df
          title: df
          type: number
        - name: p
          title: p
          type: number
          format: zto,pvalue
...
