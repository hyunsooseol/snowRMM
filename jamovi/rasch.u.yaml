title: Rasch Model
name: rasch
jus: '3.0'
stage: 0
compilerMode: tame

children:
  - type: VariableSupplier
    suggested:
      - continuous
    permitted:
      - numeric
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variables
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true

  - type: LayoutBox
    margin: none
    style: inline
    children:
      - type: ActionButton
        name: run

  - type: CollapseBox
    label: Model options
    collapsed: false
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: small
        stretchFactor: 1
        children:

          - type: LayoutBox
            cell:
              column: 0
              row: 0
            stretchFactor: 1
            children:
              - name: step
                type: TextBox
                label: Step
                format: number

          - type: LayoutBox
            cell:
              column: 1
              row: 0
            stretchFactor: 1
            children:
              - type: ComboBox
                name: type

  - type: CollapseBox
    label: Item Analysis
    margin: normal
    collapsed: true
    children:

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        children:

          - type: Label
            label: Item measures
            children:
              - type: CheckBox
                name: imean
              - type: CheckBox
                name: imeasure
              - type: CheckBox
                name: ise

          - type: Label
            label: 'RSM step parameters'
            children:
              - type: CheckBox
                name: thr
                enable: (type:RSM && !step:1)

          - type: Label
            label: 'Category diagnostics'
            children:
              - type: CheckBox
                name: catStats
 
              - type: CheckBox
                name: thresholdOrder
                enable: (type:PCM && !step:1)

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        cell:
          column: 1
          row: 0
        fitToGrid: true
        children:

          - type: Label
            label: Model fit
            children:
              - type: CheckBox
                name: fit
              - type: CheckBox
                name: rel

          - type: Label
            label: Item fit
            children:
              - type: CheckBox
                name: infit
              - type: CheckBox
                name: outfit
              - type: CheckBox
                name: pbis

  - type: CollapseBox
    label: Testing model
    margin: normal
    collapsed: true
    children:

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        children:

          - type: Label
            label: 'Dichotomous model'
            children:

              - type: CheckBox
                name: lr
                enable: (step:1)
                children:
                  - type: ComboBox
                    name: lrsplit
                    enable: (lr && step:1)

              - type: CheckBox
                name: ml
                enable: (step:1)
                children:
                  - type: ComboBox
                    name: mlsplit
                    enable: (ml && step:1)

              - type: CheckBox
                name: wald
                enable: (step:1)
                children:
                  - type: ComboBox
                    name: waldsplit
                    enable: (wald && step:1)

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        cell:
          column: 1
          row: 0
        fitToGrid: true
        children:

          - type: Label
            label: 'Dichotomous Model Plot'
            children:
              - type: CheckBox
                name: gofplot
                enable: (step:1)
                children:
                  - type: ComboBox
                    name: tlab
                    enable: (gofplot && step:1)

          - type: Label
            label: 'Polytomous RSM model'
            children:
              - type: CheckBox
                name: lr1
                enable: (type:RSM && !step:1)
                children:
                  - type: ComboBox
                    name: lrsplit1
                    enable: (lr1 && type:RSM && !step:1)

  - type: CollapseBox
    label: 'Plots'
    margin: normal
    collapsed: true
    children:

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        children:

          - type: Label
            label: ''
            fitToGrid: true
            children:
              - type: TextBox
                name: num
                format: number

          - type: Label
            label: 'Dichotomous ICC'
            fitToGrid: true
            children:
              - type: CheckBox
                name: plot1
                enable: (step:1)

          - type: Label
            label: 'Polytomous categories'
            fitToGrid: true
            children:
              - type: CheckBox
                name: plot2
                enable: (type:RSM && !step:1)

              - type: CheckBox
                name: plot3
                enable: (type:PCM && !step:1)

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        cell:
          column: 1
          row: 0
        fitToGrid: true
        children:

          - type: Label
            label: Map
            children:
              - type: CheckBox
                name: wrightmap

              - type: CheckBox
                name: piplot
                enable: (type:PCM && !step:1)

          - type: Label
            label: Fit
            children:
              - type: CheckBox
                name: inplot

              - type: CheckBox
                name: outplot

              - type: TextBox
                name: angle
                format: number
                suggestedValues:
                  - value: 0
                  - value: 45
                  - value: 90

  - type: CollapseBox
    label: Person Analysis
    margin: normal
    collapsed: true
    children:

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        children:

          - type: Label
            label: Person measures
            fitToGrid: true
            cell:
              column: 0
              row: 0
            children:
              - type: Output
                name: ptotal

              - type: Output
                name: pmeasure

              - type: Output
                name: pse

          - type: Label
            label: Person fit
            children:
              - type: Output
                name: pinfit

              - type: Output
                name: poutfit

              - type: CheckBox
                name: plot4

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        cell:
          column: 1
          row: 0
        fitToGrid: true
        children:

          - type: Label
            label: Standardized residuals
            children:
              - type: TextBox
                name: num1
                format: number

              - type: CheckBox
                name: plot8

  - type: CollapseBox
    label: Additional Outputs
    margin: normal
    collapsed: true
    children:

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        children:

          - type: Label
            label: 'Polytomous thresholds'
            fitToGrid: true
            cell:
              column: 0
              row: 0
            children:
              - type: CheckBox
                name: rsm
                enable: (type:RSM && !step:1)

              - type: CheckBox
                name: pcm
                enable: (type:PCM && !step:1)

          - type: Label
            label: Residual analysis (pairwise R package)
            fitToGrid: true
            cell:
              column: 1
              row: 0
            children:

              - type: CheckBox
                name: plot5
                children:
                  - type: ComboBox
                    name: res
                    enable: (plot5)

              - type: CheckBox
                name: q3
                children:
                  - type: ComboBox
                    name: res1
                    enable: (q3)

                  - type: CheckBox
                    name: cormatrix
                    enable: (q3)

  - type: CollapseBox
    label: Nonparametric Rasch Model Test
    margin: normal
    collapsed: true
    children:

      - type: LayoutBox
        stretchFactor: 1
        margin: large
        children:

          - type: Label
            label: 'Dichotomous Model Diagnostics'
            fitToGrid: true
            cell:
              column: 0
              row: 0
            children:

              - type: TextBox
                name: matrix
                format: number
                enable: (step:1)

              - type: ComboBox
                name: npmethod
                enable: (step:1)

              - type: CheckBox
                name: nptest
                enable: (step:1)